name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  merge_group:
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      actions: write          # Upload artifacts
      security-events: write  # Upload CodeQL results
    steps:
      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: build-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: java
          queries: security-and-quality

      - name: Download Ontology, Build Without Tests
        run: mvn -P download-ontology -B package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and Export to Docker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          tags: torch:latest
          outputs: type=docker,dest=/tmp/torch.tar
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4

      - name: Upload Torch Jar
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: torch-jar
          path: target/torch.jar

      - name: Upload Torch Image
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: torch-image
          path: /tmp/torch.tar

  image-scan:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      security-events: write  # Upload Trivy SARIF results
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: torch:latest
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          timeout: '15m0s'
          skip-files: 'app/ontology/*'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1

      - name: Upload Trivy Scan Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-results.sarif

  test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: tests-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Download Ontology and Run Tests
        run: mvn -P download-ontology -B verify

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  blackbox-integration-tests:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar


      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: tests-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Run Blackbox Integration Tests
        run: mvn -P blackbox-integration-tests -B verify

  performance-integration-test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-release-attachments
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba

        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start Docker Compose
        working-directory: .github/workflows/infra
        run: docker compose up --wait -d
      - name: Run integration script
        run: bash .github/workflows/performance-script-integration-with-references/integration-test.sh
  
  script-integration-test:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-patients
            patients: ""              # no --patients flag
            expected_patients: 4
            expected_observations: 4

          - name: with-patients
            patients: "VHF00006"
            expected_patients: 1
            expected_observations: 1

    name: script-integration-test (${{ matrix.name }})
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-release-attachments
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba

        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start Docker Compose
        working-directory: .github/workflows/script-integration-test
        run: docker compose up --wait -d

      - name: Run integration script
        env:
          PATIENTS: ${{ matrix.patients }}
          EXPECTED_PATIENT_COUNT: ${{ matrix.expected_patients }}
          EXPECTED_OBSERVATION_COUNT: ${{ matrix.expected_observations }}
        run: bash .github/workflows/script-integration-test/patient-param-test.sh

  script-resumeability-test:
    needs: build
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        restart_after_seconds: [ 5,30, 60, 90 ]

    name: resumability (restart container after ${{ matrix.restart_after_seconds }}s)
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-release-attachments
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba

        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start Docker Compose
        working-directory: .github/workflows/infra
        run: docker compose up --wait -d
      - name: Run resumability script
        run: bash .github/workflows/resume-integration-test/container-restart-test.sh
        env:
          RESTART_AFTER_SECONDS: ${{ matrix.restart_after_seconds }}
  
  env-var-check:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Run without required env vars
        run: |
          set -e
          # Run Torch without required env vars
          if docker run --rm torch:latest 2>&1 | tee output.log | grep -q "APPLICATION FAILED TO START"; then
            echo "✅ Container failed as expected due to missing required config"
          else
            echo "❌ Container did not fail with missing config"
            cat output.log
            exit 1
          fi

  task-api-integration-test:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        script:
          - pause-resume-test.sh
          - cancel-test.sh
          - delete-test.sh

    name: task-api-test (${{ matrix.script }})
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba
        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start Docker Compose
        working-directory: .github/workflows/infra
        run: docker compose up --wait -d

      - name: Run task api integration script
        run: bash .github/workflows/task-tests/${{ matrix.script }}

  push-image:
    needs:
      - test
      - image-scan
      - blackbox-integration-tests
      - script-integration-test
      - script-resumeability-test
      - env-var-check
      - performance-integration-test
      - task-api-integration-test
    runs-on: ubuntu-24.04
    permissions:
      packages: write  # Push to GitHub Container Registry
      id-token: write  # For Cosign signing
      contents: write
    if: ${{ ! startsWith(github.head_ref, 'dependabot/')}}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21 for Maven Build
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: tests-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Download Torch Jar
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-jar
          path: target

      - name: Download Torch Image
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Download Ontology
        run: mvn -Pdownload-ontology -B process-resources

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/medizininformatik-initiative/torch
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: docker-build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Sign GHCR Image
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${{ steps.docker-build-push.outputs.digest }}"

      - name: Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/')

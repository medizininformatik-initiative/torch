name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  merge_group:
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      actions: write          # Upload artifacts
      security-events: write  # Upload CodeQL results
    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: build-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: java
          queries: security-and-quality

      - name: Download Ontology, Build Without Tests
        run: mvn -P download-ontology -B package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and Export to Docker
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          tags: torch:latest
          outputs: type=docker,dest=/tmp/torch.tar
                
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

      - name: Upload Torch Jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: torch-jar
          path: target/torch.jar

      - name: Upload Torch Image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: torch-image
          path: /tmp/torch.tar

  image-scan:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      security-events: write  # Upload Trivy SARIF results
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: torch:latest
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          timeout: '15m0s'
          skip-files: 'app/ontology/*'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1

      - name: Upload Trivy Scan Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif

  shell-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run docker-entrypoint shell tests
        run: bats src/test/shell/docker-entrypoint.bats

  test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: tests-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Download Ontology and Run Tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: mvn -P download-ontology -B verify

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  blackbox-integration-tests:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar


      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: tests-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Run Blackbox Integration Tests
        run: mvn -P blackbox-integration-tests -B verify

  performance-integration-test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-release-attachments
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba

        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Start Docker Compose
        working-directory: .github/workflows/infra
        run: docker compose up --wait -d
      - name: Run integration script
        run: bash .github/workflows/performance-script-integration-with-references/integration-test.sh
  
  script-integration-test:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-patients
            patients: ""              # no --patients flag
            expected_patients: 4
            expected_observations: 4

          - name: with-patients
            patients: "VHF00006"
            expected_patients: 1
            expected_observations: 1

    name: script-integration-test (${{ matrix.name }})
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-release-attachments
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba

        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Start Docker Compose
        working-directory: .github/workflows/script-integration-test
        run: docker compose up --wait -d

      - name: Run integration script
        env:
          PATIENTS: ${{ matrix.patients }}
          EXPECTED_PATIENT_COUNT: ${{ matrix.expected_patients }}
          EXPECTED_OBSERVATION_COUNT: ${{ matrix.expected_observations }}
        run: bash .github/workflows/script-integration-test/patient-param-test.sh

  script-resumeability-test:
    needs: build
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        restart_after_seconds: [ 5,30, 60, 90 ]

    name: resumability (restart container after ${{ matrix.restart_after_seconds }}s)
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-release-attachments
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba

        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Start Docker Compose
        working-directory: .github/workflows/resume-integration-test
        run: docker compose up --wait -d
      - name: Run resumability script
        run: bash .github/workflows/resume-integration-test/container-restart-test.sh
        env:
          RESTART_AFTER_SECONDS: ${{ matrix.restart_after_seconds }}
  
  env-var-check:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Run without required env vars
        run: |
          set -e
          # Run Torch without required env vars
          if docker run --rm torch:latest 2>&1 | tee output.log | grep -q "APPLICATION FAILED TO START"; then
            echo "✅ Container failed as expected due to missing required config"
          else
            echo "❌ Container did not fail with missing config"
            cat output.log
            exit 1
          fi

  task-api-integration-test:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        script:
          - pause-resume-test.sh
          - cancel-test.sh
          - delete-test.sh
          - get-put-search-test.sh

    name: task-api-test (${{ matrix.script }})
    steps:
      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Install Blazectl
        env:
          GH_TOKEN: ${{ github.token }}
          BLAZECTL_VERSION: v1.3.0
          BLAZECTL_CHECKSUM: 2e75ddfb9b35d0e78b5dda4d7ae4d08c45037729f5a45affd59ddb7252b75aba
        run: |
          curl -fsSL https://raw.githubusercontent.com/samply/blaze/main/.github/scripts/install-blazectl.sh -o install-blazectl.sh
          chmod +x install-blazectl.sh
          ./install-blazectl.sh

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Start Docker Compose
        working-directory: .github/workflows/infra
        run: docker compose up --wait -d

      - name: Run task api integration script
        run: bash .github/workflows/task-tests/${{ matrix.script }}

  push-image:
    needs:
      - test
      - image-scan
      - blackbox-integration-tests
      - script-integration-test
      - script-resumeability-test
      - env-var-check
      - performance-integration-test
      - task-api-integration-test
    runs-on: ubuntu-24.04
    permissions:
      packages: write  # Push to GitHub Container Registry
      id-token: write  # For Cosign signing
      contents: write
    if: ${{ ! startsWith(github.head_ref, 'dependabot/')}}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21 for Maven Build
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache Local Maven Repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: tests-maven-${{ hashFiles('pom.xml') }}

      - uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{"id": "mii", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]

      - name: Download Torch Jar
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-jar
          path: target

      - name: Download Torch Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: torch-image
          path: /tmp

      - name: Load Torch Image
        run: docker load --input /tmp/torch.tar

      - name: Download Ontology
        run: mvn -Pdownload-ontology -B process-resources

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            ghcr.io/medizininformatik-initiative/torch
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: docker-build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Sign GHCR Image
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${{ steps.docker-build-push.outputs.digest }}"

      - name: Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        if: startsWith(github.ref, 'refs/tags/')

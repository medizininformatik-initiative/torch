name: Docs
on:
  push:
    paths:
      - 'docs/**'
    branches:
      - main
  pull_request:
    paths:
      - 'docs/**'
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  merge_group:

permissions: read-all

jobs:
  build-pages:
    runs-on: ubuntu-24.04
    concurrency:
      group: docs-build-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: 'docs/package-lock.json'

      - name: Build Main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: docs
        env:
          DOCS_BASE: "/${{ github.event.repository.name }}/"
        run: make build

      - name: Build Preview
        if: github.event_name == 'pull_request'
        working-directory: docs
        env:
          DOCS_BASE: "/${{ github.event.repository.name }}/preview/pr-${{ github.event.number }}/"
        run: make build

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pages-dist
          path: docs/.vitepress/dist

  deploy-pages:
    needs: build-pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    # Serialize all gh-pages pushes globally to prevent concurrent-push conflicts
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Download Pages Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pages-dist
          path: dist

      - name: Deploy Main
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          keep_files: true

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: preview/pr-${{ github.event.number }}
          keep_files: true

      - name: Comment Preview Url
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const url = 'https://medizininformatik-initiative.github.io/${{ github.event.repository.name }}/preview/pr-${{ github.event.number }}/';
            const body = `Preview docs deployed at ${url}`;
            const marker = '<!-- preview-url-comment -->';

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                  comment_id: existing.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `${marker}\n${body}`
                });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${marker}\n${body}`
              });
            }

  cleanup-preview-page:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: gh-pages
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git rm -rf preview/pr-${{ github.event.number }} || true
          git commit -m "Remove Preview"
          git push
